<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>item-not-found</title>
	<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
    }

    .container {
        text-align: center;
        background: rgba(0, 0, 0, 0.3);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
        font-size: 72px;
        margin: 0;
    }

    h2 {
        margin: 10px 0;
        font-weight: normal;
    }

    p {
        margin: 15px 0;
        font-size: 16px;
        opacity: 0.9;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        background: #fff;
        color: #333;
        text-decoration: none;
        border-radius: 25px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #f1f1f1;
        transform: scale(1.05);
    }
</style>
	
</head>
<body>
	<div class="container">
    <h1>404</h1>
    <h2>Item Not Found</h2>
    <p>Sorry, the item you are looking for does not exist or has been removed.</p>
    
    <a href="/Items-Web-Application/ItemController" class="btn">Go Back Home</a>
</div>
</body>
</html>
