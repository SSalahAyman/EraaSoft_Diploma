<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form Styling</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    form {
        background: #ffffff;
        padding: 25px 30px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
        color: #333;
    }

    input[type="text"],
    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input[type="text"]:focus,
    select:focus {
        border-color: #74ebd5;
        box-shadow: 0 0 5px rgba(116,235,213,0.5);
    }

    p {
        margin-top: 15px;
        font-weight: bold;
    }

    input[type="radio"] {
        margin-right: 6px;
    }

    input[type="submit"] {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #74ebd5;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background: #5cc6bb;
    }
</style>

</head>
<body>

<form action="/lecture1[tasks/task2/ShowData.jsp" method="post">
    <label>Full Name:</label>
    <input type="text" name="full_name" value="no-name">
    
    <label>Password:</label>
    <input type="text" name="Password" value="no-password">
    
    <label>Age:</label>
    <input type="text" name="age" value="no-age">
    
    <p>Please select your address:</p>
    <input type="radio" name="address_radio" value="Cairo"> Cairo <br>
    <input type="radio" name="address_radio" value="Alex"> Alex <br>
    <input type="radio" name="address_radio" value="Menofia"> Menofia <br>
    
    <label>Addresses:</label>
    <select name="address_select">
        <option value="Cairo">Cairo</option>
        <option value="Alex">Alex</option>
        <option value="Menofia">Menofia</option>
    </select>
    
    <input type="submit" value="Submit">
</form>

</body>
</html>
